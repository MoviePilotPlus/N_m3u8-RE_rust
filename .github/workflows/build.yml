name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      doRelease:
        description: 'Publish new release'
        type: boolean
        default: false
        required: false
      tag:
        type: string
        description: 'Release version tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  set-date:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.get_date.outputs.date }}
      tag: ${{ steps.format_tag.outputs.tag }}
    steps:
      - name: Get Date in UTC+8
        id: get_date
        run: |
          DATE=$(date -u -d '8 hours' +'%Y%m%d')
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Determine Tag
        id: format_tag
        run: |
          if [ "${{ github.event.inputs.doRelease }}" == "true" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="actions-$GITHUB_RUN_ID"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: set-date
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x64
            archive-type: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact-name: linux-musl-x64
            archive-type: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: win-x64
            archive-type: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact-name: win-arm64
            archive-type: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: osx-x64
            archive-type: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: osx-arm64
            archive-type: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zip (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install zip

      - name: Install musl-tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools libssl-dev pkg-config

      - name: Build
        env:
          OPENSSL_DIR: /usr
          OPENSSL_STATIC: 1
          PKG_CONFIG_ALL_STATIC: 1
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          BINARY_NAME="N_m3u8-RE"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          
          mkdir -p artifact
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" artifact/
          
          cd artifact
          ARCHIVE_NAME="N_m3u8-RE_${{ needs.set-date.outputs.tag }}_${{ matrix.artifact-name }}_${{ needs.set-date.outputs.date }}"
          if [[ "${{ matrix.archive-type }}" == "zip" ]]; then
            zip "../${ARCHIVE_NAME}.zip" "${BINARY_NAME}"
          else
            tar -czvf "../${ARCHIVE_NAME}.tar.gz" "${BINARY_NAME}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: N_m3u8-RE_${{ needs.set-date.outputs.tag }}_${{ matrix.artifact-name }}_${{ needs.set-date.outputs.date }}.*

  create_release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event.inputs.doRelease == 'true' }}
    needs: [set-date, build]

    steps:
      - name: Fetch artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          name: N_m3u8-RE_${{ github.event.inputs.tag }}
          artifacts: "linux-x64/*,linux-musl-x64/*,osx-x64/*,osx-arm64/*,win-x64/*,win-arm64/*"
          draft: false
          allowUpdates: true
          generateReleaseNotes: true
